<!DOCTYPE html>
<html lang="de">

    <head>
        <meta charset="UTF-8">
        <title>Endlos Vertical Loop</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: sans-serif;
                background: #111;
                color: #fff;
                overflow: hidden;
            }

            /* ── Navbar ── */
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 2rem;
                height: 60px;
                background: rgba(17, 17, 17, 0.55);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            }

            .navbar .logo {
                font-weight: bold;
                font-size: 1.1rem;
                letter-spacing: 0.05em;
            }

            .navbar nav a {
                color: #fff;
                text-decoration: none;
                margin-left: 1.5rem;
                font-size: 0.9rem;
                opacity: 0.4;
                transition: opacity 0.3s;
            }

            .navbar nav a.active {
                opacity: 1;
            }

            /* ── Footer ── */
            .footer {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 2rem;
                height: 40px;
                background: rgba(17, 17, 17, 0.55);
                backdrop-filter: blur(12px);
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                font-size: 0.75rem;
            }

            .footer a {
                color: #fff;
                text-decoration: none;
                opacity: 0.5;
                transition: opacity 0.2s;
            }

            .footer a:hover {
                opacity: 1;
            }

            /* ── Loop ── */
            .loop-wrapper {
                height: 100vh;
                overflow: hidden;
                position: relative;
            }

            .loop-track {
                display: flex;
                flex-direction: column;
                will-change: transform;
            }

            .loop-slide {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 4rem;
                font-weight: bold;
                flex-shrink: 0;
            }

            /* Slide-Farben über data-index */
            .loop-slide[data-index="0"] {
                background: #e76f51;
            }

            .loop-slide[data-index="1"] {
                background: #2a9d8f;
            }

            .loop-slide[data-index="2"] {
                background: #e9c46a;
                color: #222;
            }

            .loop-slide[data-index="3"] {
                background: #264653;
            }

            .loop-slide[data-index="4"] {
                background: #f4a261;
            }

            /* ScrollSpy Dot-Navigation (optional, rechte Seite) */
            .dot-nav {
                position: fixed;
                right: 1.5rem;
                top: 50%;
                transform: translateY(-50%);
                z-index: 100;
                display: flex;
                flex-direction: column;
                gap: 0.6rem;
            }

            .dot-nav button {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                border: none;
                background: rgba(255, 255, 255, 0.3);
                cursor: pointer;
                padding: 0;
                transition: background 0.3s, transform 0.3s;
            }

            .dot-nav button.active {
                background: #fff;
                transform: scale(1.4);
            }
        </style>
    </head>

    <body>

        <header class="navbar">
            <span class="logo">DevPanic<span style="opacity:.5">Zone</span></span>
            <nav id="spy-nav">
                <a href="#" data-slide="0">Slide 1</a>
                <a href="#" data-slide="1">Slide 2</a>
                <a href="#" data-slide="2">Slide 3</a>
                <a href="#" data-slide="3">Slide 4</a>
                <a href="#" data-slide="4">Slide 5</a>
            </nav>
        </header>

        <div class="loop-wrapper">
            <div class="loop-track" id="track">
                <div class="loop-slide" data-index="0">Slide 1</div>
                <div class="loop-slide" data-index="1">Slide 2</div>
                <div class="loop-slide" data-index="2">Slide 3</div>
                <div class="loop-slide" data-index="3">Slide 4</div>
                <div class="loop-slide" data-index="4">Slide 5</div>
            </div>
        </div>

        <!-- Dot-Navigation -->
        <div class="dot-nav" id="dot-nav"></div>

        <footer class="footer">
            <a href="#">Impressum</a>
            <a href="#">Datenschutz</a>
            <a href="#">© 2025 DevPanicZone</a>
        </footer>

        <script>
            const track = document.getElementById("track");
            const spyNav = document.getElementById("spy-nav");
            const dotNav = document.getElementById("dot-nav");
            const navLinks = Array.from(spyNav.querySelectorAll("a"));

            // ── Duplikate automatisch erzeugen ──
            const originals = Array.from(track.children);
            originals.forEach(slide => {
                const clone = slide.cloneNode(true);
                track.appendChild(clone);
            });

            const slideHeight = window.innerHeight;
            const slideCount = originals.length;

            let currentIndex = 0;
            let isAnimating = false;
            let lastWheelTime = 0;
            const WHEEL_COOLDOWN = 800;

            track.style.transform = `translateY(0px)`;

            // ── Dot-Navigation aufbauen ──
            originals.forEach((_, i) => {
                const btn = document.createElement("button");
                btn.setAttribute("aria-label", `Slide ${i + 1}`);
                btn.addEventListener("click", () => goToSlide(i));
                dotNav.appendChild(btn);
            });

            const dots = Array.from(dotNav.querySelectorAll("button"));

            // ── ScrollSpy updaten ──
            function updateSpy(index) {
                const realIndex = ((index % slideCount) + slideCount) % slideCount;

                navLinks.forEach((a, i) => a.classList.toggle("active", i === realIndex));
                dots.forEach((d, i) => d.classList.toggle("active", i === realIndex));
            }

            updateSpy(0);

            // ── Navbar-Klick → Slide anspringen ──
            navLinks.forEach((a, i) => {
                a.addEventListener("click", (e) => {
                    e.preventDefault();
                    goToSlide(i);
                });
            });

            // ── Wheel ──
            window.addEventListener("wheel", (e) => {
                e.preventDefault();
                const now = Date.now();
                if (isAnimating || (now - lastWheelTime) < WHEEL_COOLDOWN) return;
                lastWheelTime = now;

                if (e.deltaY > 0) {
                    currentIndex++;
                } else {
                    currentIndex--;
                }

                animateToIndex(currentIndex);
            }, { passive: false });

            // ── Zu bestimmter Slide springen ──
            function goToSlide(targetIndex) {
                if (isAnimating) return;

                // kürzesten Weg finden (vorwärts oder rückwärts)
                const diff = targetIndex - (((currentIndex % slideCount) + slideCount) % slideCount);
                if (diff === 0) return;

                currentIndex = currentIndex + diff;
                animateToIndex(currentIndex);
            }

            // ── Animation ──
            function animateToIndex(index) {
                isAnimating = true;
                updateSpy(index);

                const fromY = getCurrentTranslateY();
                const toY = -(index * slideHeight);
                const distance = toY - fromY;
                const duration = 700;
                let startTime = null;

                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = easeInOutCubic(progress);

                    track.style.transform = `translateY(${fromY + distance * eased}px)`;

                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        loopReset();
                        isAnimating = false;
                        lastWheelTime = Date.now();
                    }
                }

                requestAnimationFrame(step);
            }

            function loopReset() {
                if (currentIndex >= slideCount) {
                    currentIndex -= slideCount;
                    track.style.transform = `translateY(${-(currentIndex * slideHeight)}px)`;
                }
                if (currentIndex < 0) {
                    currentIndex += slideCount;
                    track.style.transform = `translateY(${-(currentIndex * slideHeight)}px)`;
                }
            }

            function getCurrentTranslateY() {
                const matrix = new DOMMatrix(window.getComputedStyle(track).transform);
                return matrix.m42;
            }

            function easeInOutCubic(t) {
                return t < 0.5
                    ? 4 * t * t * t
                    : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }
        </script>
    </body>

</html>
