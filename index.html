<!DOCTYPE html>
<html lang="de">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Endless Vertical Loop</title>
        <meta name="description" content="Endless Full Height Loop mit Section Scrolling">
        <meta name="author" content="Bianca | DontDevPanic">
        <meta name="robots" content="index, follow">
        <link rel="stylesheet" href="css/style.css">
        <style>

        </style>
    </head>

    <body>

        <header class="navbar">
            <span class="logo">DevPanic<span class="opacity-muted">Zone</span></span>
            <nav id="spy-nav" aria-label="Seitennavigation">
                <ul role="list">
                    <li><a href="#" data-slide="0">Slide 1</a></li>
                    <li><a href="#" data-slide="1">Slide 2</a></li>
                    <li><a href="#" data-slide="2">Slide 3</a></li>
                    <li><a href="#" data-slide="3">Slide 4</a></li>
                    <li><a href="#" data-slide="4">Slide 5</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="loop-wrapper">
                <div class="loop-track" id="track">

                    <section class="loop-slide" data-index="0">
                        <div>
                            <h1>Slide 1</h1>
                            <p>1. Section</p>
                        </div>
                    </section>

                    <section class="loop-slide" data-index="1">
                        <h2>Slide 2</h2>
                    </section>

                    <section class="loop-slide" data-index="2">
                        <h2>Slide 3</h2>
                    </section>

                    <section class="loop-slide" data-index="3">
                        <h2>Slide 4</h2>
                    </section>

                    <section class="loop-slide" data-index="4">
                        <h2>Slide 5</h2>
                    </section>

                </div>
            </div>


            <!-- Dot-Navigation -->
            <div class="dot-nav" id="dot-nav" aria-label="Seitennavigation"></div>
        </main>

        <footer class="footer">
            <a href="#">Impressum</a>
            <a href="#">Datenschutz</a>
            <a href="#">© 2025 DevPanicZone</a>
        </footer>

        <script src="js/main.js"></script>

    </body>

</html>
